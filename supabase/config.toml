# HabitApp — configuración Supabase CLI
# Documentación: https://supabase.com/docs/guides/cli/config

project_id = "habitapp-api"

[api]
enabled = true
port = 54321
schemas = ["public", "gestion", "seguimiento", "comunidad"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.migrations]
enabled = true

[db.seed]
enabled = false

[studio]
enabled = true
port = 54323
