version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: habitapp-api
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - FRONTEND_URL=http://localhost:3000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - RESEND_API_KEY=${RESEND_API_KEY}
    depends_on:
      - redis
    restart: always

  redis:
    image: redis:7-alpine
    container_name: habitapp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

volumes:
  redis_data:
